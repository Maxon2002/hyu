<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Table</title>

    <link rel="icon" href="../images/Hyu-favicon.png" type="image/x-icon">
    <link rel="shortcut icon" href="../images/Hyu-favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="style-reservation.css">

    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <header class="header">
        <div class="header-wrapper">
            <div class="header-buttons">
                <div class="header-button-menu">View Menu</div>
                <!-- <div class="header-button-book">Book Your Table</div> -->
            </div>
            <a href="../index.html" class="header-logo"><img src="../images/Hyu Logo.svg" alt="logo"></a>
            <div class="header-language">
                <div class="header-language-selected">English</div>
                <img src="../images/language-icon.svg" alt="language-icon" class="header-language-icon">
            </div>
        </div>
    </header>
    <div class="separator"></div>

    <div class="reservation-section">
        <h2 class="text-block-title">Book Your Table Now</h2>
        <div class="reservation-form-container">
            <div class="reservation-form-wrapper">
                <form class="reservation-form">
                    <div class="part-form active">

                        <!-- Дата -->
                        <label for="date">Date</label>
                        <input type="text" id="date" name="date" placeholder="Choose your date" required>
                        <!-- <input type="date" id="date" name="date" placeholder="Date" required> -->

                        <!-- Время -->
                        <label for="time">Time</label>
                        <select id="time" name="time" disabled required>
                            <option value="" disabled selected>Select a time</option>

                            <option value="11:00">11:00</option>
                            <option value="11:30">11:30</option>
                            <option value="12:00">12:00</option>
                            <option value="12:30">12:30</option>
                            <option value="13:00">13:00</option>
                            <option value="13:30">13:30</option>
                            <option value="14:00">14:00</option>
                            <option value="14:30">14:30</option>
                            <option value="15:00">15:00</option>
                            <option value="15:30">15:30</option>
                            <option value="16:00">16:00</option>
                            <option value="16:30">16:30</option>
                            <option value="17:00">17:00</option>
                            <option value="17:30">17:30</option>
                            <option value="18:00">18:00</option>
                            <option value="18:30">18:30</option>
                            <option value="19:00">19:00</option>
                            <option value="19:30">19:30</option>
                            <option value="20:00">20:00</option>
                            <option value="20:30">20:30</option>
                            <option value="21:00">21:00</option>
                            <option value="21:30">21:30</option>
                            <option value="22:00">22:00</option>
                            <option value="22:30">22:30</option>
                            <option value="23:00">23:00</option>
                        </select>

                        <!-- Количество человек -->
                        <label for="guests">Number of Guests</label>
                        <input type="number" id="guests" name="guests" placeholder="How many in your party" required>
                        <!-- <button type="button" class="next-form">Continue</button> -->
                        <div class="next-form">Continue</div>
                    </div>
                    <div class="part-form">
                        <!-- Имя -->
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="Full name" required>

                        <!-- Телефон -->
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+..." required>

                        <!-- Email -->
                        <label for="email">Email (optional)</label>
                        <input type="email" id="email" name="email" placeholder="example@mail.com">

                        <!-- Комментарий -->
                        <label for="message">Additional Comments (optional)</label>
                        <textarea id="message" name="message" rows="4"
                            placeholder="Allergies, seating preferences, occasion, etc."></textarea>

                        <!-- Кнопка -->
                        <div class="btn-form-wrapper">
                            <!-- <button type="button" class="prev-form">Previous</button> -->
                            <div class="prev-form">Previous</div>
                            <!-- <button type="button" class="submit-btn">Book Now</button> -->
                            <div class="submit-btn">Book Now</div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="confirm-form-container">
                <div class="confirm-form">
                    <img src="../images/close-button.svg" alt="close-button" class="close-confirm-form">
                    <!-- <span class="close-confirm-form">&times;</span> -->

                    <p>Thank you, <span class="confirm-name"></span>!
                        Your reservation on <span class="confirm-date"></span> at
                        <span class="confirm-time"></span> has been received.
                        <br><br>
                        We look forward to welcoming you!
                    </p>

                </div>
            </div>
        </div>
    </div>

    

    <footer class="footer">
        <div class="info-block">
            <img src="../images/Hyu Logo.svg" alt="logo" class="footer-logo">
            <div class="contact-info">
                <div class="contact-info-block">
                    <img src="../images/email-icon-light.svg" alt="email">
                    <div>hyurestaurant@gmail.com</div>
                </div>
                <div class="contact-info-block">
                    <img src="../images/phone-icon-light.svg" alt="phone">
                    <div>+971 502 273 004</div>
                </div>
            </div>
        </div>
        <div class="terms-block">
            <a href="">Privacy Policy</a>
            <a href="">Terms & Conditions</a>
        </div>
    </footer>




    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    <script src="script-reservation.js"></script>
</body>

</html>
